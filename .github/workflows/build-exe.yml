name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build PLC_WriteReplay (콘솔)
        run: >
          pyinstaller --onefile --console --name PLC_WriteReplay --noconfirm
          --add-data "write_replay_frames.json;."
          --add-data "upload_replay_frames.json;."
          --hidden-import plc_upload_test
          --hidden-import plc_upload_decode
          --hidden-import plc_upload_analyze
          plc_write_replay.py

      - name: Build PLC_WriteAnalyze (콘솔)
        run: >
          pyinstaller --onefile --console --name PLC_WriteAnalyze --noconfirm
          --hidden-import plc_upload_analyze
          plc_write_analyze.py

      - name: Upload PLC_WriteReplay
        uses: actions/upload-artifact@v4
        with:
          name: PLC_WriteReplay-Windows
          path: dist/PLC_WriteReplay.exe

      - name: Upload PLC_WriteAnalyze
        uses: actions/upload-artifact@v4
        with:
          name: PLC_WriteAnalyze-Windows
          path: dist/PLC_WriteAnalyze.exe
