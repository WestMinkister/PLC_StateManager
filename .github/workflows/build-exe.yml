name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build PLC_WriteReplay (콘솔)
        run: >
          pyinstaller --onefile --console --name PLC_WriteReplay --noconfirm
          --add-data "write_replay_frames.json;."
          --add-data "upload_replay_frames.json;."
          --hidden-import plc_upload_test
          --hidden-import plc_upload_decode
          --hidden-import plc_upload_analyze
          plc_write_replay.py

      - name: Build PLC_WriteAnalyze (콘솔)
        run: >
          pyinstaller --onefile --console --name PLC_WriteAnalyze --noconfirm
          --hidden-import plc_upload_analyze
          plc_write_analyze.py

      - name: Build PLC_SemanticDiff (콘솔)
        run: >
          pyinstaller --onefile --console --name PLC_SemanticDiff --noconfirm
          --hidden-import plc_upload_decode
          plc_semantic_diff.py

      - name: Build PLC_ValueAnalyze (콘솔)
        run: >
          pyinstaller --onefile --console --name PLC_ValueAnalyze --noconfirm
          --hidden-import plc_upload_analyze
          plc_value_analyze.py

      - name: Build PLC_ValueBackup (콘솔)
        run: >
          pyinstaller --onefile --console --name PLC_ValueBackup --noconfirm
          --add-data "value_read_frames.json;."
          --add-data "upload_replay_frames.json;."
          --hidden-import plc_upload_test
          plc_value_backup.py

      - name: Build PLC_XMLParser (콘솔)
        run: >
          pyinstaller --onefile --console --name PLC_XMLParser --noconfirm
          plc_xml_parser.py

      - name: Build PLC_XGTReader (콘솔)
        run: >
          pyinstaller --onefile --console --name PLC_XGTReader --noconfirm
          plc_xgt_reader.py

      - name: Upload PLC_WriteReplay
        uses: actions/upload-artifact@v4
        with:
          name: PLC_WriteReplay-Windows
          path: dist/PLC_WriteReplay.exe

      - name: Upload PLC_WriteAnalyze
        uses: actions/upload-artifact@v4
        with:
          name: PLC_WriteAnalyze-Windows
          path: dist/PLC_WriteAnalyze.exe

      - name: Upload PLC_SemanticDiff
        uses: actions/upload-artifact@v4
        with:
          name: PLC_SemanticDiff-Windows
          path: dist/PLC_SemanticDiff.exe

      - name: Upload PLC_ValueAnalyze
        uses: actions/upload-artifact@v4
        with:
          name: PLC_ValueAnalyze-Windows
          path: dist/PLC_ValueAnalyze.exe

      - name: Upload PLC_ValueBackup
        uses: actions/upload-artifact@v4
        with:
          name: PLC_ValueBackup-Windows
          path: dist/PLC_ValueBackup.exe

      - name: Upload PLC_XMLParser
        uses: actions/upload-artifact@v4
        with:
          name: PLC_XMLParser-Windows
          path: dist/PLC_XMLParser.exe

      - name: Upload PLC_XGTReader
        uses: actions/upload-artifact@v4
        with:
          name: PLC_XGTReader-Windows
          path: dist/PLC_XGTReader.exe
